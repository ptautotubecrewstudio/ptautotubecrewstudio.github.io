<title>PT Autotube Crew Studio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
overflow-x:hidden;
}

#bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

body::before{
content:"";

left:0;

}

header{
padding:20px 8%;

justify-content:space-between;

}

.logo img{

}

nav a{

text-decoration:none;
margin-left:30px;
font-size:16px;
transition:.3s;
}

nav a:hover{

}

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:60px;
margin-bottom:20px;
}

.hero h1 span{
color:#ff1e1e;
}

.hero p{
max-width:850px;
font-size:20px;
line-height:1.7;
color:#ddd;
margin-bottom:40px;
}

.btn{
display:inline-block;
padding:15px 40px;
background:#ff1e1e;
color:#fff;
text-decoration:none;
border-radius:50px;
font-weight:bold;
transition:.3s;
}

.btn:hover{
background:#fff;
color:#000;
}

footer{
padding:30px;
text-align:center;
border-top:1px solid rgba(255,255,255,.1);
